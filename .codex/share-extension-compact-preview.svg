<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">时光记紧凑半屏 Share Extension 预览</title>
  <desc id="desc">Apple 原生风格的紧凑半屏分享扩展草图，包含准备状态、分享摘要和后台处理说明。</desc>
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
  </defs>

  <!-- Photos remains visible behind the system sheet. -->
  <rect width="390" height="844" fill="#202226"/>
  <rect x="0" y="0" width="390" height="844" fill="#5b625c" filter="url(#blur)" opacity="0.75"/>
  <rect x="18" y="78" width="108" height="138" rx="4" fill="#b99678" opacity="0.78"/>
  <rect x="141" y="78" width="108" height="138" rx="4" fill="#718d91" opacity="0.72"/>
  <rect x="264" y="78" width="108" height="138" rx="4" fill="#7c8367" opacity="0.7"/>
  <rect x="18" y="232" width="108" height="138" rx="4" fill="#868d9b" opacity="0.7"/>
  <rect x="141" y="232" width="108" height="138" rx="4" fill="#a98575" opacity="0.68"/>
  <rect x="264" y="232" width="108" height="138" rx="4" fill="#727e8b" opacity="0.68"/>
  <rect width="390" height="844" fill="#000" opacity="0.28"/>

  <!-- Compact system-like sheet. -->
  <rect x="0" y="382" width="390" height="462" rx="22" fill="#f7f7f8"/>
  <rect x="0" y="404" width="390" height="440" fill="#f7f7f8"/>
  <rect x="178" y="395" width="34" height="4" rx="2" fill="#b8b8bd"/>

  <text x="195" y="433" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15" font-weight="600" fill="#1c1c1e">时光记</text>

  <circle cx="34" cy="474" r="12" fill="#34c759"/>
  <path d="M28.5 474.5l3.5 3.5 6-7" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="481" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="25" font-weight="700" fill="#1c1c1e">已准备好</text>
  <text x="24" y="512" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" fill="#1c1c1e">1 张照片将生成新的时光记录</text>
  <text x="24" y="536" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" fill="#6e6e73">原图不会被修改，完成后保存为新照片。</text>

  <text x="24" y="571" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="600" fill="#6e6e73">本次分享</text>
  <rect x="24" y="584" width="342" height="116" rx="12" fill="#ffffff"/>

  <text x="40" y="610" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#6e6e73">照片</text>
  <text x="350" y="610" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#1c1c1e">1 张</text>
  <line x1="40" y1="623" x2="350" y2="623" stroke="#e5e5ea"/>

  <text x="40" y="648" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#6e6e73">效果</text>
  <text x="350" y="648" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#1c1c1e">亲爱的媳妇 · 结婚日</text>
  <line x1="40" y1="661" x2="350" y2="661" stroke="#e5e5ea"/>

  <text x="40" y="686" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#6e6e73">保存到</text>
  <text x="350" y="686" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" fill="#1c1c1e">整理婚后生活</text>

  <rect x="24" y="718" width="342" height="46" rx="12" fill="#007aff"/>
  <text x="195" y="747" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="600" fill="#ffffff">生成时光记录</text>
  <text x="195" y="792" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" fill="#6e6e73">处理将在后台继续，你可以继续分享下一批。</text>
</svg>
